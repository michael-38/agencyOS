name: Deploy hyperworkflow.ai

on:
  push:
    branches: [main]
    paths:
      - 'hyperworkflow/**'
      - '.github/workflows/deploy-hyperworkflow.yml'
  workflow_dispatch:

concurrency:
  group: deploy-hyperworkflow
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          workingDirectory: hyperworkflow
          command: pages deploy . --project-name=hyperworkflow --branch=main --commit-dirty=true
